<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Sudoku</title>

<style>

body{
    font-family: Arial;
    text-align:center;
    background:#0274a8;
}

#board{
    display:grid;
    grid-template-columns:repeat(9,50px);
    width:450px;
    margin:20px auto;
}

.cell{
    width:50px;
    height:50px;
    text-align:center;
    font-size:20px;
    border:1px solid #888;
    box-sizing: border-box;
}

.cell.error{
    background:#ffb3b3;
}

.cell.fixed{
    background:#e0e0e0;
    color:#333;
    font-weight:bold;
}

.cell:not(.fixed){
    background:#fff;
}

.bold-right{
    border-right:3px solid black;
}

.bold-bottom{
    border-bottom:3px solid black;
}

#menu{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:15px;
    margin:30px auto;
}

.difficulty-btn{
    padding:15px 30px;
    font-size:18px;
    background:#4CAF50;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
    transition:0.3s;
}

.difficulty-btn:hover{
    background:#45a049;
}

.difficulty-btn.facil{
    background:#66BB6A;
}

.difficulty-btn.medio{
    background:#FFA726;
}

.difficulty-btn.dificil{
    background:#EF5350;
}

button{
    padding:10px 18px;
    margin:5px;
    font-size:16px;
    cursor:pointer;
    border-radius: 10px 10px 10px;
}

</style>
</head>

<body>

<h1>Sudoku</h1>

<div id="menu">
    <p style="font-size:18px; font-weight:bold;">Escolha o Modo de Jogo:</p>
    <button class="difficulty-btn facil" onclick="iniciarJogo('facil')">Fácil</button>
    <button class="difficulty-btn medio" onclick="iniciarJogo('medio')">Médio</button>
    <button class="difficulty-btn dificil" onclick="iniciarJogo('dificil')">Difícil</button>
    <button class="difficulty-btn" style="background:#9C27B0;" onclick="iniciarJogo('livre')">Modo Livre</button>
</div>

<div id="gameArea" style="display:none;">
    <div id="board"></div>
    <p id="level"></p>
    <button onclick="newGame()">Novo Jogo</button>
    <button onclick="solveSudoku()">Resolver</button>
    <button onclick="clearBoard()">Limpar</button>
    <button onclick="voltarMenu()">Voltar ao Menu</button>
    <p id="status"></p>
</div>

<script>

const boardElement=document.getElementById("board");
let dificuldadeAtual="facil";
let tabuleiroCopia=[]; // para rastrear células iniciais

function iniciarJogo(dificuldade){
    dificuldadeAtual=dificuldade;
    document.getElementById("menu").style.display="none";
    document.getElementById("gameArea").style.display="block";
    
    if(dificuldade==="livre"){
        document.getElementById("level").textContent="Modo: Livre";
    }else{
        let nivelTexto=dificuldade==="facil"?"Fácil":dificuldade==="medio"?"Médio":"Difícil";
        document.getElementById("level").textContent="Nível: "+nivelTexto;
    }
    
    newGame();
}

function voltarMenu(){
    document.getElementById("menu").style.display="flex";
    document.getElementById("gameArea").style.display="none";
    document.getElementById("status").textContent="";
}

function gerarSudokuCompleto(){
    let board=[...Array(9)].map(()=>Array(9).fill(0));
    preencherSudoku(board);
    return board;
}

function preencherSudoku(board){
    for(let r=0;r<9;r++){
        for(let c=0;c<9;c++){
            if(board[r][c]===0){
                let numeros=[1,2,3,4,5,6,7,8,9].sort(()=>Math.random()-0.5);
                for(let n of numeros){
                    if(isValid(board,r,c,n)){
                        board[r][c]=n;
                        if(preencherSudoku(board)) return true;
                        board[r][c]=0;
                    }
                }
                return false;
            }
        }
    }
    return true;
}

function removerNumeros(board,quantidade){
    let removidas=0;
    while(removidas<quantidade){
        let r=Math.floor(Math.random()*9);
        let c=Math.floor(Math.random()*9);
        if(board[r][c]!==0){
            board[r][c]=0;
            removidas++;
        }
    }
}

function createBoard(){
    boardElement.innerHTML="";
    
    let sudokuCompleto,tabuleiro;
    
    if(dificuldadeAtual==="livre"){
        tabuleiro=[...Array(9)].map(()=>Array(9).fill(0));
        tabuleiroCopia=[...Array(9)].map(()=>Array(9).fill(0));
    }else{
        sudokuCompleto=gerarSudokuCompleto();
        tabuleiro=sudokuCompleto.map(row=>[...row]);
        
        let remocoes=dificuldadeAtual==="facil"?35:dificuldadeAtual==="medio"?50:60;
        removerNumeros(tabuleiro,remocoes);
        
        tabuleiroCopia=tabuleiro.map(row=>[...row]);
    }
    
    for(let r=0;r<9;r++){
        for(let c=0;c<9;c++){
            const cell=document.createElement("input");
            cell.type="number";
            cell.min=1;
            cell.max=9;
            cell.classList.add("cell");
            
            if((c+1)%3===0 && c!==8) cell.classList.add("bold-right");
            if((r+1)%3===0 && r!==8) cell.classList.add("bold-bottom");
            
            cell.dataset.row=r;
            cell.dataset.col=c;
            
            if(tabuleiro[r][c]!==0){
                cell.value=tabuleiro[r][c];
                cell.classList.add("fixed");
                cell.readOnly=true;
            }
            
            cell.addEventListener("input",validateBoard);
            boardElement.appendChild(cell);
        }
    }
}

function getBoard(){
    const cells=document.querySelectorAll(".cell");
    let grid=[...Array(9)].map(()=>Array(9).fill(0));
    cells.forEach(cell=>{
        const r=cell.dataset.row;
        const c=cell.dataset.col;
        grid[r][c]=parseInt(cell.value)||0;
    });
    return grid;
}

function setBoard(grid){
    const cells=document.querySelectorAll(".cell");
    cells.forEach(cell=>{
        const r=cell.dataset.row;
        const c=cell.dataset.col;
        if(!tabuleiroCopia[r][c]){
            cell.value=grid[r][c]===0?"":grid[r][c];
        }
    });
}

function isValid(board,row,col,num){
    for(let i=0;i<9;i++){
        if(board[row][i]===num) return false;
        if(board[i][col]===num) return false;
    }
    let boxRow=Math.floor(row/3)*3;
    let boxCol=Math.floor(col/3)*3;
    for(let r=0;r<3;r++){
        for(let c=0;c<3;c++){
            if(board[boxRow+r][boxCol+c]===num) return false;
        }
    }
    return true;
}

function solve(board){
    for(let r=0;r<9;r++){
        for(let c=0;c<9;c++){
            if(board[r][c]===0){
                for(let n=1;n<=9;n++){
                    if(isValid(board,r,c,n)){
                        board[r][c]=n;
                        if(solve(board)) return true;
                        board[r][c]=0;
                    }
                }
                return false;
            }
        }
    }
    return true;
}

function solveSudoku(){
    let board=getBoard();
    if(solve(board)){
        setBoard(board);
        document.getElementById("status").textContent="Resolvido ✅";
    }else{
        document.getElementById("status").textContent="Sem solução.";
    }
}

function clearBoard(){
    document.querySelectorAll(".cell").forEach(cell=>{
        if(!cell.classList.contains("fixed")){
            cell.value="";
            cell.classList.remove("error");
        }
    });
}

function validateBoard(){
    const board=getBoard();
    const cells=document.querySelectorAll(".cell");
    cells.forEach(cell=>{
        const r=parseInt(cell.dataset.row);
        const c=parseInt(cell.dataset.col);
        const value=parseInt(cell.value);
        cell.classList.remove("error");
        if(!value) return;
        board[r][c]=0;
        if(!isValid(board,r,c,value)){
            cell.classList.add("error");
        }
        board[r][c]=value;
    });
}

function newGame(){
    clearBoard();
    createBoard();
    document.getElementById("status").textContent="Novo jogo iniciado!";
}

</script>

</body>
</html>
